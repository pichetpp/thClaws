<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — thClaws Shell</title>
  <style>
    :root { --bg: #0b1220; --surface: #0f172a; --border: #1f2937;
      --fg: #f8fafc; --muted: #94a3b8; --teal: #0d9488; --amber: #f59e0b; --red: #ef4444; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 14px/1.5 system-ui, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; gap: 14px; }
    header h1 { margin: 0; font-size: 18px; }
    header .updated { color: var(--muted); font-size: 12px; }
    header button { margin-left: auto; background: var(--teal); color: white; border: 0;
      border-radius: 6px; padding: 6px 14px; font-weight: 600; cursor: pointer; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      padding: 16px 24px; }
    .stat { background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; }
    .stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .stat .value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .stat .delta { font-size: 12px; margin-top: 2px; }
    .delta.up { color: var(--teal); } .delta.down { color: var(--red); }
    .activity { padding: 0 24px 24px; }
    .activity h2 { font-size: 13px; color: var(--muted); text-transform: uppercase; }
    .activity .row { background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; display: flex;
      justify-content: space-between; align-items: center; }
    .pill { background: rgba(13, 148, 136, 0.18); color: var(--teal);
      border-radius: 999px; padding: 2px 10px; font-size: 11px; }
  </style>
</head>
<body>
  <header>
    <h1>Agent dashboard</h1>
    <span class="updated" id="updated">never refreshed</span>
    <button id="refresh">Refresh</button>
  </header>
  <div class="stats" id="stats"></div>
  <div class="activity">
    <h2>Recent activity</h2>
    <div id="activity"></div>
  </div>
  <script>
    const stats = document.getElementById("stats");
    const activity = document.getElementById("activity");
    const updated = document.getElementById("updated");
    const refresh = document.getElementById("refresh");

    function renderStats(items) {
      stats.innerHTML = "";
      items.forEach((s) => {
        const d = document.createElement("div"); d.className = "stat";
        const dir = (s.delta || "").startsWith("-") ? "down" : "up";
        d.innerHTML = `<div class="label">${s.label}</div>
          <div class="value">${s.value}</div>
          ${s.delta ? `<div class="delta ${dir}">${s.delta}</div>` : ""}`;
        stats.appendChild(d);
      });
    }
    function renderActivity(items) {
      activity.innerHTML = "";
      items.forEach((a) => {
        const r = document.createElement("div"); r.className = "row";
        r.innerHTML = `<span>${a.text}</span><span class="pill">${a.tag || "info"}</span>`;
        activity.appendChild(r);
      });
    }
    let buf = "";
    function tryParse() {
      try {
        const data = JSON.parse(buf);
        renderStats(data.stats || []); renderActivity(data.activity || []);
        updated.textContent = `updated ${new Date().toLocaleTimeString()}`;
        buf = "";
      } catch { /* keep buffering */ }
    }
    refresh.onclick = async () => {
      buf = "";
      // Author: customise the prompt so the agent returns JSON the
      // dashboard can render. Example shape baked into the prompt.
      const prompt = `Reply with ONLY valid JSON, no prose. Shape:
{"stats":[{"label":"…","value":"…","delta":"+5%"}],"activity":[{"text":"…","tag":"sale"}]}`;
      await window.thclaws.run(prompt);
    };
    window.thclaws.on("text", ({ delta }) => { buf += delta; });
    window.thclaws.on("done", tryParse);
    // Initial render — empty placeholders.
    renderStats([
      { label: "Pending", value: "0" }, { label: "Today", value: "0" },
      { label: "This week", value: "0" }, { label: "Errors", value: "0" },
    ]);
  </script>
</body>
</html>

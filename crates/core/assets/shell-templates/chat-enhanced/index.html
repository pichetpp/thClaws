<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat Enhanced — thClaws Shell</title>
  <style>
    :root {
      --bg: #0b1220; --surface: #0f172a; --border: #1f2937;
      --fg: #f8fafc; --muted: #94a3b8; --teal: #0d9488; --amber: #f59e0b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
    .shell { display: grid; grid-template-rows: 1fr auto; height: 100vh; }
    .messages { overflow-y: auto; padding: 16px 24px; }
    .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 10px;
      max-width: 760px; }
    .msg.user { background: var(--surface); border: 1px solid var(--border); margin-left: auto; }
    .msg.assistant { background: rgba(13, 148, 136, 0.08); border: 1px solid rgba(13, 148, 136, 0.3); }
    .msg.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
    .role { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .composer { border-top: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 8px; }
    .composer textarea { flex: 1; background: var(--surface); color: var(--fg);
      border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
      resize: none; font: inherit; min-height: 44px; max-height: 200px; }
    .composer button { background: var(--teal); color: white; border: 0;
      border-radius: 8px; padding: 0 18px; font-weight: 600; cursor: pointer; }
    .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
    .quick { display: flex; gap: 6px; padding: 0 24px 12px; flex-wrap: wrap; }
    .quick button { background: var(--surface); color: var(--muted); border: 1px solid var(--border);
      border-radius: 999px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
    .quick button:hover { color: var(--fg); border-color: var(--teal); }
  </style>
</head>
<body>
  <div class="shell">
    <div class="messages" id="messages"></div>
    <div class="quick" id="quick"></div>
    <div class="composer">
      <textarea id="input" placeholder="ถามอะไรก็ได้…" rows="1"></textarea>
      <button id="send">Send</button>
    </div>
  </div>
  <script>
    const messages = document.getElementById("messages");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const quick = document.getElementById("quick");

    // Author-editable quick prompts — replace these with your own.
    const QUICK_PROMPTS = [
      "Summarise what you can do for me",
      "List my pinned files",
      "Run a status check",
    ];
    QUICK_PROMPTS.forEach((p) => {
      const b = document.createElement("button");
      b.textContent = p;
      b.onclick = () => { input.value = p; sendPrompt(); };
      quick.appendChild(b);
    });

    let current = null;
    function bubble(role, text) {
      const d = document.createElement("div");
      d.className = `msg ${role}`;
      d.innerHTML = `<div class="role">${role}</div><div class="body"></div>`;
      d.querySelector(".body").textContent = text;
      messages.appendChild(d);
      messages.scrollTop = messages.scrollHeight;
      return d.querySelector(".body");
    }

    async function sendPrompt() {
      const prompt = input.value.trim();
      if (!prompt || send.disabled) return;
      bubble("user", prompt);
      input.value = "";
      send.disabled = true;
      current = bubble("assistant", "…");
      current.textContent = "";
      try { await window.thclaws.run(prompt); } catch (e) {
        bubble("error", String(e?.message ?? e));
        send.disabled = false;
      }
    }
    send.onclick = sendPrompt;
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
    });

    window.thclaws.on("text", ({ delta }) => { if (current) current.textContent += delta; });
    window.thclaws.on("done", () => { current = null; send.disabled = false; });
    window.thclaws.on("error", ({ message }) => {
      bubble("error", message || "unknown error");
      send.disabled = false; current = null;
    });
  </script>
</body>
</html>

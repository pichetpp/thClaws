## thClaws Helm chart — default values

image:
  repository: thclaws/thclaws
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

replicaCount: 1

## --serve flags
serve:
  port: 8443
  bind: "0.0.0.0"

## Multi-tenant mode (dev-plan/35)
## Requires a routing layer (e.g. thClaws.cloud or your own proxy) that
## attaches HMAC-signed X-Thclaws-User / X-Thclaws-Ts / X-Thclaws-Proof headers.
multiTenant:
  enabled: false
  maxUsers: 100
  ## Idle timeout before a user session is evicted (seconds)
  idleTimeout: 3600
  ## HMAC secret — set one of:
  ##   secret: "plaintext-value"          (creates a new Secret)
  ##   existingSecret: "my-k8s-secret"    (use pre-existing Secret, key must be "hmac-secret")
  secret: ""
  existingSecret: ""

## GUI Shell (dev-plan/33)
guiShell:
  enabled: false
  id: ""

## LLM provider API keys
## Set keys directly or point to a pre-existing Secret.
## existingSecret keys must match: anthropic-api-key, openai-api-key, gemini-api-key, openrouter-api-key
apiKeys:
  anthropic: ""
  openai: ""
  gemini: ""
  openrouter: ""
  existingSecret: ""

## /workspace — the project directory the agent operates on.
## In multi-tenant mode all per-user state lands under .thclaws/users/<id>/
workspace:
  ## Use a PersistentVolumeClaim (recommended for stateful workloads)
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    ## Use an existing PVC instead of creating one
    existingClaim: ""

## ~/.config/thclaws — agent config, sessions list, model prefs, etc.
config:
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    existingClaim: ""

service:
  type: ClusterIP
  port: 8443

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: thclaws.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: thclaws-tls
  #   hosts:
  #     - thclaws.example.com

## Pod resource requests/limits
resources: {}
  # requests:
  #   cpu: 500m
  #   memory: 512Mi
  # limits:
  #   cpu: 2
  #   memory: 2Gi

## Horizontal Pod Autoscaler
## Only useful if each replica serves a disjoint workspace (single-tenant, sharded).
## Multi-tenant deployments should scale by increasing maxUsers instead.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false  # thclaws writes to /workspace and ~/.config

## NetworkPolicy — restrict pod ingress/egress (requires a CNI that enforces NetworkPolicy)
networkPolicy:
  enabled: false
  ## Restrict which sources may reach port 8443.
  ## Leave empty to allow from all sources within the cluster.
  ## Example: allow only from an ingress-nginx namespace:
  ##   ingressFrom:
  ##     - namespaceSelector:
  ##         matchLabels:
  ##           kubernetes.io/metadata.name: ingress-nginx
  ingressFrom: []
  ## Allow DNS egress (required for hostname resolution)
  allowDNS: true
  ## Additional egress rules appended verbatim
  extraEgress: []

nodeSelector: {}
tolerations: []
affinity: {}
